name: Deploy Test

on:
  push:
    branches:
      - qa
  workflow_dispatch:
    inputs:
      run_full_suite:
        description: Ejecutar la suite completa de QA
        required: false
        default: false
        type: boolean

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          CLASP_JSON_TEST: ${{ secrets.CLASP_JSON_TEST }}
        run: |
          test -n "$CLASPRC_JSON"
          test -n "$CLASP_JSON_TEST"
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          printf '%s' "$CLASP_JSON_TEST" > .clasp.test.json

      - name: Validate harness loads
        run: npm run test:qtas:list

      - name: Push to Apps Script test
        run: npm run deploy:test:push

      - name: Write QA runtime config
        env:
          QTAS_TEST_CONFIG_JSON: ${{ secrets.QTAS_TEST_CONFIG_JSON }}
          GOOGLE_AUTHORIZED_USER_JSON_TEST: ${{ secrets.GOOGLE_AUTHORIZED_USER_JSON_TEST }}
        run: |
          if [ -z "$QTAS_TEST_CONFIG_JSON" ] || [ -z "$GOOGLE_AUTHORIZED_USER_JSON_TEST" ]; then
            echo "Skipping headless tests: faltan QTAS_TEST_CONFIG_JSON o GOOGLE_AUTHORIZED_USER_JSON_TEST."
            exit 0
          fi
          printf '%s' "$QTAS_TEST_CONFIG_JSON" > tests/qtas.test.config.json

      - name: Run headless Apps Script probe
        env:
          QTAS_TEST_CONFIG_JSON: ${{ secrets.QTAS_TEST_CONFIG_JSON }}
          GOOGLE_AUTHORIZED_USER_JSON: ${{ secrets.GOOGLE_AUTHORIZED_USER_JSON_TEST }}
        run: |
          if [ -z "$QTAS_TEST_CONFIG_JSON" ] || [ -z "$GOOGLE_AUTHORIZED_USER_JSON" ]; then
            echo "Skipping probe: faltan QTAS_TEST_CONFIG_JSON o GOOGLE_AUTHORIZED_USER_JSON_TEST."
            exit 0
          fi
          npm run test:qtas:probe:qa

      - name: Run headless Apps Script smoke suite
        env:
          QTAS_TEST_CONFIG_JSON: ${{ secrets.QTAS_TEST_CONFIG_JSON }}
          GOOGLE_AUTHORIZED_USER_JSON: ${{ secrets.GOOGLE_AUTHORIZED_USER_JSON_TEST }}
        run: |
          if [ -z "$QTAS_TEST_CONFIG_JSON" ] || [ -z "$GOOGLE_AUTHORIZED_USER_JSON" ]; then
            echo "Skipping smoke suite: faltan QTAS_TEST_CONFIG_JSON o GOOGLE_AUTHORIZED_USER_JSON_TEST."
            exit 0
          fi
          npm run test:qtas:smoke:qa

      - name: Run headless Apps Script full suite
        if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.run_full_suite == 'true') || (github.event_name == 'push' && vars.QTAS_RUN_FULL_SUITE_ON_QA_PUSH == 'true') }}
        env:
          GOOGLE_AUTHORIZED_USER_JSON: ${{ secrets.GOOGLE_AUTHORIZED_USER_JSON_TEST }}
        run: npm run test:qtas:full:qa
