name: Deploy Production

on:
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          CLASP_JSON_PROD: ${{ secrets.CLASP_JSON_PROD }}
        run: |
          test -n "$CLASPRC_JSON"
          test -n "$CLASP_JSON_PROD"
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          printf '%s' "$CLASP_JSON_PROD" > .clasp.json

      - name: Push to Apps Script production
        run: npm run deploy:prod:push
